
services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports: 
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: 
      - ./frontend/.env
    networks:
      - flowtask-network

  node-api:
    build: 
      context: ./backend/node-api
      dockerfile: Dockerfile
    ports: 
      - "4000:4000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend/node-api:/app
      - /app/node_modules
    env_file: 
      - ./backend/node-api/.env
    depends_on: 
      - redis
    networks:
      - flowtask-network

  ml-api:
    build: ./backend/ml-api
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
    env_file: 
      - ./backend/ml-api/.env
    networks:
      - flowtask-network

  redis:
    image: redis:7-alpine
    ports: 
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - flowtask-network

networks:
  flowtask-network:
    driver: bridge

volumes:
  redis-data:

